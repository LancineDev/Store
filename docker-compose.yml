services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: sportzone
      POSTGRES_PASSWORD: sportzonepass
      POSTGRES_DB: sportzone
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    env_file:
      - .env.local
    environment:
      - DATABASE_URL
      - NEXTAUTH_URL
      - NEXTAUTH_SECRET
      - AUTH_SECRET
      - CINETPAY_API_KEY
      - CINETPAY_SITE_ID
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

volumes:
  db_data:
