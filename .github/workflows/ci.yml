name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm build

      - name: Run migrations (if DATABASE_URL set)
        if: ${{ secrets.DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm exec prisma migrate deploy

      - name: Lint
        run: pnpm lint || true
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: sportzone
          POSTGRES_PASSWORD: sportzonepass
          POSTGRES_DB: sportzone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sportzone -d sportzone" \
          --health-interval 10s \
          --health-timeout 5s \
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install pnpm
        run: npm i -g pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Generate Prisma client
        run: pnpm prisma generate
      - name: Run Prisma migrations
        env:
          DATABASE_URL: postgres://sportzone:sportzonepass@localhost:5432/sportzone
        run: npx prisma migrate deploy
      - name: Build
        run: pnpm build
